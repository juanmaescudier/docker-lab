# ---------------------------------------------------------------------------------------------------
# Pipeline CI/CD de la imagen de la API.
# En cada push a main:  construye -> escanea (Trivy) -> publica en GHCR.
# En cada Pull Request:  construye -> escanea, pero NO publica (validación previa).
#
# Nota de versiones: las actions (@vX) suben con el tiempo. Estos majors funcionan;
# ---------------------------------------------------------------------------------------------------

name: Build-scan-push nutriapp image GHCR

# === DISPARADORES (eventos que lanzan el workflow) ===
on:
  push:
    branches: [main]              # push a main -> construye, escanea Y publica
    paths:                        # ...pero solo si cambian estos archivos (optimización)
      - 'services/api/**'         #   2 asteríscos = todo lo que hay dentro de la carpeta
      - '.github/workflows/**'    #   o si cambia el propio workflow
  pull_request:
    branches: [main]              # PR hacia main -> construye y escanea, NO publica
  workflow_dispatch:              # botón manual "Run workflow" en la pestaña Actions

jobs:
  deploy:
    runs-on: ubuntu-latest        # runner GRATIS de GitHub (NO self-hosted)

    # Permisos del GITHUB_TOKEN para este job:
    permissions:
      contents: read              # leer el código del repo
      packages: write             # necesario para PUBLICAR la imagen en GHCR

    # Variable reutilizable: nombre de la imagen en GHCR (todo en minúsculas)
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}-api   # -> ghcr.io/juanmaescudier/docker-lab-api

    steps:
      # 1) Traer el código del repo al runner
      - name: Checkout del repo
        uses: actions/checkout@v4

      # 2) Preparar Buildx, el constructor que usa build-push-action
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # 3) Generar tags y labels automáticamente a partir del contexto de git
      - name: Metadata
        id: meta                            # id para leer sus salidas (outputs) luego
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # tags que genera: type=sha (hash del commit, trazable) y latest (solo en main).
          # OJO: dentro de un bloque "tags: |" NO se pueden poner comentarios (ver abajo).
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # 4) Autenticarse en GHCR. Solo si NO es un PR (en PR no publicamos).
      - name: Login en GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}           # tu usuario (quien dispara el run)
          password: ${{ secrets.GITHUB_TOKEN }}   # token automático de GitHub (no lo configuras tú)

      # 5) Construir la imagen y CARGARLA en local (todavía SIN publicar),
      #    con una etiqueta fija para poder escanearla antes de publicar.
      - name: Build (cargar en local para escanear)
        uses: docker/build-push-action@v6
        with:
          context: ./services/api             # dónde está el Dockerfile y el código
          load: true                          # carga la imagen en el docker local del runner
          push: false                         # todavía NO se publica
          tags: nutriapp:ci                   # etiqueta local temporal, solo para el escaneo

      # 6) Escanear la imagen construida con Trivy
      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: nutriapp:ci              # la imagen que acabamos de cargar
          severity: CRITICAL,HIGH             # solo nos importan estas
          ignore-unfixed: true                # ignora las que NO tienen fix (como las del SO base)
          exit-code: '1'                      # si hay alguna FIXABLE -> rompe el build

      # 7) Publicar en GHCR. Solo si NO es PR (y si llegamos aquí, el escaneo pasó).
      #    Reutiliza la caché del paso 5, así que este build es casi instantáneo.
      - name: Push a GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          push: true                                # ahora sí, publica
          tags: ${{ steps.meta.outputs.tags }}      # los tags reales (sha, latest) del paso 3
          labels: ${{ steps.meta.outputs.labels }}
