<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="580" rx="16" fill="#0d1117"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#e6edf3">Nutriapp · Docker Lab — Arquitectura (M0)</text>
  <text x="500" y="68" text-anchor="middle" font-size="13" fill="#8b949e">API contenerizada + PostgreSQL + Redis, orquestada con Docker Compose</text>

  <!-- Host panel -->
  <rect x="36" y="110" width="210" height="250" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="141" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#e6edf3">Host · tu máquina</text>
  <text x="141" y="172" text-anchor="middle" font-size="12" fill="#8b949e">curl · navegador</text>
  <rect x="56" y="192" width="170" height="34" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.3"/>
  <text x="141" y="214" text-anchor="middle" font-size="12" fill="#e6edf3">localhost:8000</text>
  <text x="141" y="262" text-anchor="middle" font-size="11" fill="#8b949e">único puerto</text>
  <text x="141" y="278" text-anchor="middle" font-size="11" fill="#8b949e">publicado al host</text>

  <!-- Host -> Compose arrow -->
  <line x1="246" y1="209" x2="298" y2="209" stroke="#3fb950" stroke-width="1.6" marker-end="url(#arrowg)"/>
  <text x="272" y="200" text-anchor="middle" font-size="10" fill="#3fb950">:8000</text>

  <!-- Compose panel -->
  <rect x="300" y="100" width="660" height="300" rx="12" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
  <text x="630" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#e6edf3">Docker Compose · proyecto docker-lab</text>

  <!-- frontend network -->
  <rect x="320" y="146" width="620" height="86" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="334" y="165" font-size="11" fill="#8b949e">red: frontend</text>
  <rect x="445" y="172" width="370" height="48" rx="8" fill="#0d1117" stroke="#2496ED" stroke-width="1.6"/>
  <text x="630" y="193" text-anchor="middle" font-size="13" font-weight="700" fill="#e6edf3">nutriapp · Flask + gunicorn</text>
  <text x="630" y="210" text-anchor="middle" font-size="11" fill="#8b949e">:8000 · usuario no-root</text>

  <!-- backend network -->
  <rect x="320" y="246" width="620" height="142" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="334" y="266" font-size="11" fill="#8b949e">red: backend (internal · sin salida a internet)</text>

  <rect x="345" y="282" width="280" height="92" rx="8" fill="#0d1117" stroke="#4f8fbf" stroke-width="1.6"/>
  <text x="485" y="306" text-anchor="middle" font-size="13" font-weight="700" fill="#e6edf3">PostgreSQL 18</text>
  <text x="485" y="326" text-anchor="middle" font-size="11" fill="#8b949e">:5432</text>
  <text x="485" y="345" text-anchor="middle" font-size="11" fill="#8b949e">volumen pgdata · persistente</text>
  <text x="485" y="364" text-anchor="middle" font-size="11" fill="#3fb950">healthcheck ✓</text>

  <rect x="650" y="282" width="270" height="92" rx="8" fill="#0d1117" stroke="#DC382D" stroke-width="1.6"/>
  <text x="785" y="306" text-anchor="middle" font-size="13" font-weight="700" fill="#e6edf3">Redis</text>
  <text x="785" y="326" text-anchor="middle" font-size="11" fill="#8b949e">:6379</text>
  <text x="785" y="345" text-anchor="middle" font-size="11" fill="#8b949e">sesiones · temporal</text>

  <!-- app -> db / cache arrows -->
  <line x1="560" y1="220" x2="485" y2="282" stroke="#4f8fbf" stroke-width="1.5" marker-end="url(#arrowb)"/>
  <text x="500" y="256" text-anchor="middle" font-size="10" fill="#8b949e">SQLAlchemy</text>
  <line x1="700" y1="220" x2="785" y2="282" stroke="#DC382D" stroke-width="1.5" marker-end="url(#arrowr)"/>
  <text x="770" y="256" text-anchor="middle" font-size="10" fill="#8b949e">sesión</text>

  <!-- Feature strip -->
  <rect x="36" y="455" width="928" height="90" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="129" cy="487" r="5" fill="#3fb950"/>
  <text x="129" y="512" text-anchor="middle" font-size="12" fill="#e6edf3">Usuario no-root</text>
  <circle cx="315" cy="487" r="5" fill="#3fb950"/>
  <text x="315" y="512" text-anchor="middle" font-size="12" fill="#e6edf3">Healthchecks</text>
  <circle cx="500" cy="487" r="5" fill="#2496ED"/>
  <text x="500" y="512" text-anchor="middle" font-size="12" fill="#e6edf3">Red backend aislada</text>
  <circle cx="686" cy="487" r="5" fill="#d29922"/>
  <text x="686" y="512" text-anchor="middle" font-size="12" fill="#e6edf3">Volumen persistente</text>
  <circle cx="871" cy="487" r="5" fill="#3fb950"/>
  <text x="871" y="512" text-anchor="middle" font-size="12" fill="#e6edf3">Secretos vía .env</text>

  <defs>
    <marker id="arrowg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f8fbf"/>
    </marker>
    <marker id="arrowr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC382D"/>
    </marker>
  </defs>
</svg>
